<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdmissionForm</title>
</head>
<body>
    <form action="#" method="post">
        <h2>Student Admission Form</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="father_name">Father's Name:</label>
        <input type="text" id="father_name" name="father_name" required><br><br>

        <label for="mother_name">Mother's Name:</label>
        <input type="text" id="mother_name" name="mother_name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="Mobile">Mobile:</label>
        <input type="tel" id="Mobile" name="Mobile" required><br><br>

        <label for="Gender">Gender:</label>
        <input type="radio" id="Male" name="Gender" value="Male" >Male
        <input type="radio" id="Female"  name="Gender" value="Female">Female<br><br>
        
        
        <lable for="date of birth">Date of Birth:</lable>
        <input type="date" id="date of birth" name="date of birth" required><br><br>

        <lable for="course">Course:</lable>
        <select id="course" name="course" required>
            <option value="">Select a course</option>
            <option value="Sports Management">Sports Management</option>
            <option value="BBA">BBA</option>
            <option value="B.Tech">B.Tech</option>
            <option value="MBBS">MBBS</option>
            <option value="MBA">MBA</option>
        </select><br><br>

        <label for="Address">Address:</label>
        <textarea id="Address" name="Address" required></textarea><br><br>

        <label for="Hobbies">Hobbies:</label>
        <input type="checkbox" id="Hobbies" name="Hobbies" value="Reading">Reading
        <input type="checkbox" id="Hobbies" name="Hobbies" value="Sports">Sports
        <input type="checkbox" id="Hobbies" name="Hobbies" value="Music">Music
        <input type="checkbox" id="Hobbies" name="Hobbies" value="Traveling">Traveling<br><br> 
        
        <label for="photo">Upload Photo:</label>
        <input type="file" id="photo" name="photo" accept="image/*" required><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">



    </form>
</body>
</html>
